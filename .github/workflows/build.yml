name: Build Gravity TNT Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Debug resources
  run: |
    echo "=== build.gradle: sourceSets/processResources ==="
    grep -nE "sourceSets|srcDir|processResources|duplicatesStrategy|generated" build.gradle || true

    echo "=== tracked files in git ==="
    git ls-files | grep -E 'mods\.toml|pack\.mcmeta' || true

    echo "=== all matching files in workspace ==="
    find . -type f \( -name 'mods.toml' -o -name 'pack.mcmeta' \) | sort

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Gravity-TNT-Mod-JAR
        path: build/libs/*.jar
